server {

	server_name memoria.anna.9farm.com;

	listen [::]:443 ssl;

	ssl_certificate	    ssl.d/anna.9farm.com.crt;
	ssl_certificate_key ssl.d/anna.9farm.com.key;

	access_log /log/memoria/access.log;
	error_log  /log/memoria/error.log;

	root /www/memoria/build-memoria;

	location /assets {
		autoindex on;
		alias /www/memoria/client/src/assets;
	}

    location /api {
        proxy_pass http://127.0.0.1:22709;
	}

    location /node_modules/.vite/deps {
        proxy_pass http://127.0.0.1:22708;
    }

    location / {
        proxy_pass http://127.0.0.1:22708;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

	location = /robots.txt  {
		access_log off; log_not_found off;
	}

	location = /favicon.ico {
		expires max;
		access_log off;
		log_not_found off;
	}
	# location ~ /\. { access_log off; log_not_found off; deny all; }
}

server {

	server_name memoria-dist.anna.9farm.com;

	listen [::]:443 ssl;

	ssl_certificate	    ssl.d/anna.9farm.com.crt;
	ssl_certificate_key ssl.d/anna.9farm.com.key;

	access_log /log/memoria/access.log;
	error_log  /log/memoria/error.log;

	root /www/memoria/client/dist-git;

    location /api {
        proxy_pass http://127.0.0.1:22709;
	}

    location / {
		index index.html;
    }

	location = /robots.txt  {
		access_log off; log_not_found off;
	}

	location = /favicon.ico {
		expires max;
		access_log off;
		log_not_found off;
	}
}

server {

	server_name memoria.anna.9farm.com;
	server_name memoria-dist.anna.9farm.com;

	listen [::]:80;

	location / {
		return 301 https://$host$request_uri;
	}
}
