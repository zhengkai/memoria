edition = "2024";

option go_package = "/pb";
package pb;

import "item.proto";

message RenderNoteYear {
	uint32 year = 1;
	repeated uint64 list = 2;
}

message RenderNoteYearIndex {
	repeated uint32 year = 1;
}

message RenderArticleYear {
	uint32 year = 1;
	repeated RenderArticleItem list = 2;
}

message RenderArticleIndex {
	repeated RenderArticleYear list = 1;
}

message RenderArticleItem {
	uint64 id = 1;
	ItemMetaV2 meta = 2;
	uint64 ts_create = 6;
}
