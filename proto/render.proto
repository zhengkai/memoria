edition = "2024";

option go_package = "/pb";
package pb;

import "item.proto";

message RenderNoteYear {
	uint32 year = 1;
	repeated uint64 list = 2;
}

message RenderNoteYearIndex {
	repeated uint32 year = 1;
}

message RenderArticleYear {
	uint32 year = 1;
	repeated ItemLite list = 2;
}

message RenderArticleIndex {
	repeated RenderArticleYear year = 1;
}
