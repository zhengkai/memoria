syntax = "proto3";
option go_package = "/pb";
package pb;

import "item.proto";
import "list.proto";

message APIError {
	uint32 code = 1;
	string message = 2;
}

message APIReq {
	oneof one {
		uint32 itemGet = 10;
		ItemEdit itemSet = 11;
		uint32 itemListRecent = 20;
		ItemSearch itemSearch = 21;
	}
}

message APIRsp {
	APIError error = 1;
	oneof one {
		Item itemGet = 10;
		uint64 itemSet = 11;
		ItemList itemListRecent = 20;
		ItemList itemSearch = 21;
	}
}
