edition = "2024";

option go_package = "/pb";
package pb;

import "error.proto";
import "item.proto";
import "list.proto";


message APIReq {
	oneof one {
		uint64 item_get = 10;
		ItemEdit item_set = 11;
		uint32 item_list_recent = 20;
		ItemSearch item_search = 21;
	}
}

message APIRsp {
	Error error = 1;
	oneof one {
		Item item_get = 10;
		uint64 item_set = 11;
		ItemList item_list_recent = 20;
		ItemList item_search = 21;
	}
}
