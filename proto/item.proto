edition = "2024";

option go_package = "/pb";
package pb;

import "format.proto";
import "revision.proto";
import "opengraph.proto";

message ItemContent {
	Format.Enum format = 1;
	string raw = 2;
}

message Item {
	uint64 id = 1;
	ItemMeta meta = 2;
	Revision content = 3;
	OpenGraph og = 4;
}

message ItemV2 {
	uint64 id = 1;
	ItemMetaV2 meta = 2;
	ItemContent content = 3;
	uint64 ts_meta = 4;
	uint64 ts_content = 5;
	uint64 ts_create = 6;
}

message ItemUpdate {
	uint64 id = 1;
	ItemMetaV2 meta = 2;
	ItemContent content = 3;
}

message ItemLite {
	uint64 id = 1;
	ItemMeta meta = 2;
}

message ItemMeta {
	uint64 ts_create = 1;
	uint64 ts_revise = 2;
	uint64 ts_hide = 3;
	uint64 root = 4;
	string title = 5;
	bool original = 6;
	bool trivial = 7;
	string tweet_id = 8;
}

message ItemDB {
	uint64 id = 1;
	ItemMeta meta = 2;
	uint64 revision_id = 3;
	uint64 og_id = 4;
}

message ItemDBv2 {
	uint64 id = 1;
	uint64 meta_revision_id = 2;
	uint64 content_revision_id = 3;
	uint64 ts_meta = 4;
	uint64 ts_content = 5;
	uint64 ts_create = 6;
}

message ItemMetaV2 {
	uint64 ts_hide = 1;
	uint64 root = 2;
	string title = 3;
	bool original = 4;
	bool trivial = 5;
	OpenGraph og = 7;
}

message ItemEdit {
	uint64 id = 1;
	ItemContent content = 2;
	string title = 3;
	uint64 root = 4;
	uint64 ts_create = 5;
	bool hide = 6;
	bool original = 7;
	bool trivial = 8;
	OpenGraph og = 9;
	string tweet_id = 10;
}

message ItemList {
	repeated ItemV2 list = 1;
	uint64 cursor = 2;
	uint64 effected = 3;
}
