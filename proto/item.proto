edition = "2024";

option go_package = "/pb";
package pb;

import "revision.proto";
import "opengraph.proto";

message Item {
	uint64 id = 1;
	ItemMeta meta = 2;
	Revision content = 3;
	OpenGraph og = 4;
}

message ItemLite {
	uint64 id = 1;
	ItemMeta meta = 2;
}

message ItemMeta {
	uint64 ts_create = 1;
	uint64 ts_revise = 2;
	uint64 ts_hide = 3;
	uint64 root = 4;
	string title = 5;
	bool original = 6;
	bool trivial = 7;
	string tweet_id = 8;
}

message ItemDB {
	uint64 id = 1;
	ItemMeta meta = 2;
	uint64 revision_id = 3;
	uint64 og_id = 4;
}

message ItemEdit {
	uint64 id = 1;
	Revision content = 2;
	string title = 3;
	uint64 root = 4;
	uint64 ts_create = 5;
	bool hide = 6;
	bool original = 7;
	bool trivial = 8;
	OpenGraph og = 9;
	string tweet_id = 10;
}

message ItemList {
	repeated Item list = 1;
	uint64 cursor = 2;
	uint64 effected = 3;
}
